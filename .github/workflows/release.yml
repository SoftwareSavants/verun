name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare VERSION to latest tag
        id: check
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if [ -z "$latest_tag" ]; then
            echo "No tags found — releasing v$version"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$latest_tag" = "v$version" ]; then
            echo "v$version already released — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$version (latest tag: $latest_tag)"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Set up notarization API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY" > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign, and notarize
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Software Savants LLC (5Y6UKMM68W)"
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Zip app bundle
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          zip -r Verun_${{ needs.check-version.outputs.version }}_macos_aarch64.zip Verun.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Verun_*.zip

  release:
    needs: [check-version, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-aarch64
          path: artifacts

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ needs.check-version.outputs.version }}"
          escaped=$(echo "$version" | sed 's/\./\\./g')
          # Extract the section for this version from CHANGELOG.md
          awk "/^## ${escaped}( |\$)/{found=1; next} found && /^## [0-9]/{exit} found" CHANGELOG.md > /tmp/release_notes.md
          # If nothing was extracted, use a default
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release v${version}" > /tmp/release_notes.md
          fi

      - name: Create tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.check-version.outputs.version }}" \
            artifacts/* \
            --title "v${{ needs.check-version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
