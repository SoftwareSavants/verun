<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Verun</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'Helvetica Neue', 'Ubuntu', 'Cantarell', sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      /* xterm.js: use default cursor instead of text cursor */
      .shell-terminal .xterm { cursor: default; }
      .shell-terminal .xterm-helper-textarea { cursor: default !important; }
    </style>
  </head>

  <body>
    <div id="splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a0a;z-index:99999;transition:opacity 0.3s ease">
      <div style="text-align:center">
        <div style="font-size:28px;font-weight:700;letter-spacing:-0.5px;color:#e4e4e7">Verun</div>
        <div style="margin-top:8px;font-size:12px;color:#52525b">Loading...</div>
      </div>
    </div>
    <div id="root" style="opacity:0;transition:opacity 0.3s ease"></div>
    <script>
      // Skip splash screen for task windows — they load fast enough
      if (new URLSearchParams(location.search).get('windowType') === 'task') {
        document.getElementById('splash')?.remove()
        document.getElementById('root').style.opacity = '1'
      }
    </script>
    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
